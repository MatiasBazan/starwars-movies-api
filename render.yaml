services:
  - type: web
    name: starwars-movies-api
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: starwars-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true

databases:
  - name: starwars-db
    databaseName: starwars_movies
    user: postgres
    plan: free
